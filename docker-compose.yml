services:
  app:
    build:
      context: .
      target: development
    container_name: cars-control-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - cars-network
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: cars-control-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cars_control}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cars-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  cars-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
